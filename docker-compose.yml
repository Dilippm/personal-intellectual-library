version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: personal-library-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-personal_library}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library-network

  # Uncomment when you're ready to dockerize the backend
  # backend:
  #   build:
  #     context: ./libraryservice
  #     dockerfile: Dockerfile
  #   container_name: personal-library-api
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-personal_library}
  #     NODE_ENV: development
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - library-network
  #   volumes:
  #     - ./libraryservice/src:/app/src

volumes:
  postgres_data:

networks:
  library-network:
    driver: bridge
